services:
  - type: web
    name: bookmatch
    env: python
    buildCommand: pip install -r webapp/requirements.txt
    startCommand: streamlit run webapp/app.py --server.port $PORT --server.address 0.0.0.0 --server.enableCORS false --server.enableXsrfProtection false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
    region: frankfurt
